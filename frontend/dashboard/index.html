<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Blam(mo)</title>
        <link rel="stylesheet" href="../style.css">
        <link rel="shortcut icon" href="../images/blam.png" type="image/x-icon">
        <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />
    </head>
    <body>
        <h1 id="header">
            <div class="spoon"></div>
            Blam Dashboard
            <div class="spoon"></div>
        </h1>
        <span class="buttons">
            <a href="../" class="button"><i class="ph ph-ranking"></i>Leaderboard</a>
            <a href="../report" class="button" id="report"><i class="ph ph-megaphone-simple"></i>Report a Blammo!</a>
            <a href="../rules" class="button" id="rules"><i class="ph ph-scroll"></i>Rules</a>
        </span>
        <div id="auth">
            <label for="password-input"><strong>Enter Password</strong></label>
            <input type="password" id="password-input" placeholder="Password" />
            <button id="login-btn">Login</button>
            <span id="auth-error"></span>
        </div>
        <div id="unauthorized-msg">unauthorized</div>
        <div id="main-content">
            <section id="buttons">
                <button id="randomize" onclick="randomize()">
                    <i class="ph ph-shuffle"></i>Randomize Targets
                </button>
            </section>
            <section id="users">
                <table>
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Target</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Remove</th>
                            <th>Revive</th>
                        </tr>
                    </thead>
                    <tbody id="users-table-body"></tbody>
                </table>
            </section>
            <section id="add-user-form">
                <h3>Add User</h3>
                <div>
                    <input type="text" id="add-name" placeholder="Name" />
                    <input type="email" id="add-email" placeholder="Email" />
                    <input type="text" id="add-grade" placeholder="Grade" />
                    <button onclick="addUser()" id="add-btn">Add</button>
                </div>
                <span id="add-error"></span>
                <input type="file" id="csv" accept=".csv" style="display: none;">
                <hr>
                <button id="fake-file-input">
                    <i class="ph ph-file-csv"></i>Select CSV
                </button>
                <div id="csv-table-wrapper">
                    <span id="csv-name"></span>
                    <div id="csv-headers"></div>
                    <table id="csv-table"></table>
                </div>
                <button id="import" disabled><span>Import</span><i class='ph ph-circle-notch loader'></i></button>
            </section>
            <section id="requests-section">
                <h2 id="blam-h2">Blam Requests <button id="reload-blam-requests"><i class="ph ph-arrow-clockwise"></i></button></h2>
                <span id="no-requests">There are no Blam Requests right now</span>
                <ul id="requests"></ul>
            </section>
        </div>
        <script src="./csv.js"></script>
        <script src="../default.js"></script>
        <script src="./script.js"></script>
    </body>
</html>
